<!doctype html>
<html class="dark" lang="id">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Antrian Inbound CBT</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link

      rel="stylesheet"
    />
    <style>

        --surface-variant: 42 53 72;

        --on-background: 216 227 251;
        --primary: 180 197 255;
        --primary-container: 37 99 235;
        --primary-fixed: 219 225 255;
        --primary-fixed-dim: 180 197 255;
        --on-primary: 0 42 120;
        --on-primary-container: 238 239 255;
        --on-primary-fixed: 0 23 75;
        --secondary: 210 187 255;

        --tertiary-fixed-dim: 255 181 150;
        --error: 255 180 171;
        --error-container: 147 0 10;
        --on-error: 105 0 5;
        --on-error-container: 255 218 214;
        --outline: 141 144 160;
        --outline-variant: 67 70 85;
        --inverse-surface: 216 227 251;
        --inverse-on-surface: 38 49 67;
        --inverse-primary: 0 83 219;

        --shader-blend: normal;
      }

      html.light {
        color-scheme: light;
        --background: 245 248 255;
        --surface: 245 248 255;
        --surface-dim: 233 240 251;
        --surface-container-lowest: 238 244 255;
        --surface-container-low: 255 255 255;
        --surface-container: 237 243 252;
        --surface-container-high: 223 233 248;
        --surface-container-highest: 208 220 239;
        --surface-variant: 219 230 247;
        --surface-bright: 255 255 255;
        --on-surface: 15 23 42;
        --on-surface-variant: 71 85 105;
        --on-background: 15 23 42;
        --primary: 29 78 216;
        --primary-container: 37 99 235;
        --primary-fixed: 219 234 254;
        --primary-fixed-dim: 147 197 253;
        --on-primary: 255 255 255;
        --on-primary-container: 239 246 255;
        --on-primary-fixed: 15 23 42;
        --secondary: 109 40 217;
        --secondary-container: 109 40 217;
        --secondary-fixed: 237 233 254;
        --secondary-fixed-dim: 196 181 253;
        --on-secondary: 255 255 255;
        --on-secondary-container: 245 243 255;
        --tertiary: 234 88 12;
        --tertiary-container: 254 215 170;
        --tertiary-fixed-dim: 253 186 116;
        --error: 220 38 38;
        --error-container: 254 226 226;
        --on-error: 255 255 255;
        --on-error-container: 127 29 29;
        --outline: 100 116 139;
        --outline-variant: 203 213 225;
        --inverse-surface: 15 23 42;
        --inverse-on-surface: 248 250 252;
        --inverse-primary: 96 165 250;
        --surface-tint: 37 99 235;
        --success: 22 163 74;
        --warning: 217 119 6;
        --shader-opacity: 0.24;
        --shader-filter: saturate(1.25) brightness(1.55);
        --shader-blend: multiply;
      }

      body {
        background: rgb(var(--background));
        color: rgb(var(--on-surface));
      }

      #shader-bg {
        opacity: var(--shader-opacity) !important;
        filter: var(--shader-filter);
        mix-blend-mode: var(--shader-blend);
        transition:
          opacity 0.35s ease,
          filter 0.35s ease;
      }
      .glass-card {
        background: rgba(21, 32, 49, 0.64);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(67, 70, 85, 0.42);
        transition:
          background 0.35s ease,
          border-color 0.35s ease,
          color 0.35s ease;
      }
      .light .glass-card {
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.45);
        box-shadow: 0 16px 45px rgba(15, 23, 42, 0.08);
      }
      .status-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .calling-effect {
        animation: calling 0.5s ease-out;
      }
      @keyframes calling {
        0% {
          transform: scale(1);
          background-color: #2563eb;
        }
        50% {
          transform: scale(1.05);
          background-color: #b4c5ff;
          color: #00174b;
        }
        100% {
          transform: scale(1);
          background-color: #2563eb;
        }
      }
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #434655;
        border-radius: 10px;
      }
      .light ::-webkit-scrollbar-thumb {
        background: #c4c6cf;
      }
    </style>
    <script id="tailwind-config">

              "outline-variant": "rgb(var(--outline-variant) / <alpha-value>)",

              "inverse-on-surface":

              "surface-container-low":

              "on-primary": "rgb(var(--on-primary) / <alpha-value>)",

              "tertiary-container":

              "surface-dim": "rgb(var(--surface-dim) / <alpha-value>)",
              "surface-container-lowest":

              "surface-variant": "rgb(var(--surface-variant) / <alpha-value>)",
              error: "rgb(var(--error) / <alpha-value>)",
              "surface-container-highest":
                "rgb(var(--surface-container-highest) / <alpha-value>)",
              "on-surface": "rgb(var(--on-surface) / <alpha-value>)",
              "secondary-fixed-dim":
                "rgb(var(--secondary-fixed-dim) / <alpha-value>)",
              "on-error": "rgb(var(--on-error) / <alpha-value>)",
              "inverse-primary": "rgb(var(--inverse-primary) / <alpha-value>)",
              "surface-bright": "rgb(var(--surface-bright) / <alpha-value>)",
              "surface-tint": "rgb(var(--surface-tint) / <alpha-value>)",
              outline: "rgb(var(--outline) / <alpha-value>)",
              "on-background": "rgb(var(--on-background) / <alpha-value>)",
              primary: "rgb(var(--primary) / <alpha-value>)",
              background: "rgb(var(--background) / <alpha-value>)",
              "on-secondary": "rgb(var(--on-secondary) / <alpha-value>)",
              "secondary-container":
                "rgb(var(--secondary-container) / <alpha-value>)",
              "surface-container-high":
                "rgb(var(--surface-container-high) / <alpha-value>)",
              surface: "rgb(var(--surface) / <alpha-value>)",
              "error-container": "rgb(var(--error-container) / <alpha-value>)",
              "primary-fixed": "rgb(var(--primary-fixed) / <alpha-value>)",
              "primary-container":
                "rgb(var(--primary-container) / <alpha-value>)",
              secondary: "rgb(var(--secondary) / <alpha-value>)",
              success: "rgb(var(--success) / <alpha-value>)",
              warning: "rgb(var(--warning) / <alpha-value>)",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              base: "4px",
              "row-height-lg": "72px",
              "row-height-md": "56px",
              "container-padding": "24px",
              gutter: "16px",
            },
            fontFamily: {
              "headline-lg": ["Montserrat"],
              "body-lg": ["Montserrat"],
              "display-lg": ["Montserrat"],

                "32px",

              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],

  </head>
  <body

    <div

    <div class="relative z-10 flex h-screen overflow-hidden">
      <aside
        class="bg-surface-container-lowest/80 backdrop-blur-xl border-r border-outline-variant w-64 h-screen flex-col py-4 gap-2 hidden md:flex transition-all duration-300"
      >
        <div class="px-6 mb-8">

        <nav id="side-nav" class="flex-1 flex flex-col gap-1">
          <button data-page="daftar" class="nav-btn">

      id="toast"
    >
      <span class="material-symbols-outlined">check_circle</span>
      <span id="toast-message">Berhasil</span>

    <script>
      const state = {
        page: "antrian",
        lastCalled: { queue: "IB-023", dock: "Dock 04", driver: "Budi S." },
        queue: [
          {
            id: "IB-024",
            status: "MENUNGGU",
            dock: "-",
            wait: "22:45",
            driver: "Sarah L.",
            supplier: "Supplier A",
            priority: "Normal",
          },
          {
            id: "IB-025",
            status: "PRIORITAS",
            dock: "Dock 03",
            wait: "02:10",
            driver: "Jin S.",
            supplier: "Supplier B",
            priority: "High",
          },
          {
            id: "IB-026",
            status: "DI DOCK",
            dock: "Dock 02",
            wait: "04:12",
            driver: "Marcus V.",
            supplier: "Supplier C",
            priority: "Normal",
          },
          {
            id: "IB-027",
            status: "MENUNGGU",
            dock: "-",
            wait: "18:03",
            driver: "Andi P.",
            supplier: "Supplier D",
            priority: "Normal",
          },
        ],
      };

      const navBase =
        "flex items-center gap-3 text-on-surface-variant px-4 py-3 mx-2 hover:bg-surface-container-high rounded-full transition-all group active:scale-98";
      const navActive =
        "flex items-center gap-3 bg-secondary-container text-on-secondary-container rounded-full px-4 py-3 mx-2 transition-all active:scale-98";
      const mobBase =
        "px-4 py-2 rounded-full text-label-sm bg-surface-container text-on-surface-variant border border-outline-variant";
      const mobActive =
        "px-4 py-2 rounded-full text-label-sm bg-secondary-container text-on-secondary-container border border-secondary-container font-bold";

      const pageMeta = {
        daftar: {
          title: "Daftar",
          subtitle: "Input driver datang dan ambil nomor antrian",
        },
        antrian: {
          title: "Antrian",
          subtitle: "Pantau urutan dan panggil driver inbound",
        },
        panggil: {
          title: "Panggil",
          subtitle: "Layar panggilan model bank untuk TV/display",
        },
        dock: {
          title: "Dock",
          subtitle: "Pantau dock kosong, aktif, dan warning",
        },
        monitor: {
          title: "Monitor",
          subtitle: "Ringkasan performa inbound hari ini",
        },
        laporan: {
          title: "Laporan",
          subtitle: "Rekap dan export data antrian",
        },
        setting: { title: "Setting", subtitle: "Atur SLA, dock, dan tampilan" },
        bantuan: {
          title: "Bantuan",
          subtitle: "Panduan singkat penggunaan sistem",
        },
      };

      function kpiCards() {
        return `
        <div class="grid grid-cols-1 md:grid-cols-4 gap-gutter">
          ${cardKpi("Total Antrian", "42", "pending_actions", "text-primary", "+12% dari rata-rata")}
          ${cardKpi("Menunggu", "18", "schedule", "text-tertiary", "3 sudah > 60 menit")}
          ${cardKpi("SLA OK", "98.4%", "verified", "text-primary", "Target 95%")}
          <div class="bg-primary-container p-6 rounded-xl flex flex-col justify-between shadow-lg shadow-primary-container/20 group hover:brightness-110 transition-all cursor-pointer overflow-hidden relative">
            <div class="flex justify-between items-start">
              <span class="font-headline-md text-headline-md text-on-primary-container">Siap Dipanggil</span>
              <span class="material-symbols-outlined text-on-primary-container">arrow_forward_ios</span>
            </div>
            <button class="mt-4 bg-on-primary text-primary-fixed-dim py-3 rounded-lg font-bold flex items-center justify-center gap-2 hover:bg-black transition-colors" id="call-next-btn" onclick="callNext(this)">
              <span class="material-symbols-outlined">campaign</span>
              PANGGIL BERIKUTNYA
            </button>
          </div>
        </div>`;
      }

      function cardKpi(label, value, icon, color, note) {
        return `
        <div class="glass-card p-6 rounded-xl flex flex-col gap-2 relative overflow-hidden group">
          <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
            <span class="material-symbols-outlined text-4xl">${icon}</span>
          </div>
          <span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">${label}</span>
          <div class="flex items-end gap-2">
            <span class="font-headline-lg text-headline-lg ${color}" id="kpi-${label.toLowerCase().replaceAll(" ", "-")}">${value}</span>
          </div>
          <span class="text-[11px] text-on-surface-variant">${note}</span>
        </div>`;
      }

      function queueTable() {
        return `
        <div class="glass-card rounded-xl overflow-hidden border border-outline-variant/30">
          <div class="p-6 border-b border-outline-variant/30 flex flex-col md:flex-row md:justify-between md:items-center gap-4">
            <div class="flex items-center gap-3">
              <span class="material-symbols-outlined text-primary">stream</span>
              <h3 class="font-headline-md text-headline-md">Data Antrian</h3>
            </div>
            <div class="flex gap-2">
              <input class="bg-surface-container-high/50 border-none rounded-lg text-label-sm px-4 py-2 w-full md:w-64 focus:ring-1 focus:ring-primary" placeholder="Cari nomor / driver..." type="text"/>
              <button class="bg-surface-container-high/50 p-2 rounded-lg material-symbols-outlined">filter_list</button>
            </div>
          </div>
          <div class="overflow-x-auto">
            <table class="w-full text-left">
              <thead class="bg-surface-container text-on-surface-variant">
                <tr>
                  <th class="px-6 py-4 font-label-sm uppercase tracking-wider">No. Antrian</th>
                  <th class="px-6 py-4 font-label-sm uppercase tracking-wider">Status</th>
                  <th class="px-6 py-4 font-label-sm uppercase tracking-wider">Dock</th>
                  <th class="px-6 py-4 font-label-sm uppercase tracking-wider">Lama Tunggu</th>
                  <th class="px-6 py-4 font-label-sm uppercase tracking-wider">Driver</th>
                  <th class="px-6 py-4 font-label-sm uppercase tracking-wider text-right">Aksi</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-outline-variant/10">
                ${state.queue.map(rowTemplate).join("")}
              </tbody>
            </table>
          </div>
        </div>`;
      }

      function rowTemplate(q) {
        const style =
          q.status === "DI DOCK"
            ? "bg-primary/20 text-primary border-primary/30"
            : q.status === "PRIORITAS"
              ? "bg-primary/10 text-primary border-primary/50"
              : "bg-tertiary/20 text-tertiary border-tertiary/30";
        const icon =
          q.status === "DI DOCK"
            ? "local_shipping"
            : q.status === "PRIORITAS"
              ? "star"
              : "schedule";
        return `
        <tr class="hover:bg-primary/5 transition-colors group ${q.status === "PRIORITAS" ? "border-l-4 border-primary" : ""}">
          <td class="px-6 py-4">
            <div class="flex items-center gap-3">
              <span class="w-2 h-2 rounded-full ${q.status === "MENUNGGU" ? "bg-tertiary" : "bg-primary status-pulse"}"></span>
              <span class="font-queue-id ${q.status === "PRIORITAS" ? "text-primary" : ""}">${q.id}</span>
            </div>
          </td>
          <td class="px-6 py-4">
            <span class="px-3 py-1 rounded-full text-[10px] font-bold ${style} border flex items-center gap-1 w-fit">
              <span class="material-symbols-outlined text-[14px]">${icon}</span>${q.status}
            </span>

      function pageAntrian() {
        return `
        ${kpiCards()}
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-gutter">
          <div class="lg:col-span-2 glass-card rounded-xl p-6 relative overflow-hidden flex flex-col">
            <div class="flex justify-between items-start mb-6">

      function miniMetric(label, value, color) {

      function pagePanggil() {

      function pageDock() {
        const docks = [
          ["Dock 01", "AKTIF", "IB-030"],
          ["Dock 02", "BONGKAR", "IB-026"],
          ["Dock 03", "SIAP", "-"],
          ["Dock 04", "DIPANGGIL", state.lastCalled.queue],
          ["Dock 05", "AKTIF", "IB-020"],
          ["Dock 06", "KOSONG", "-"],
          ["Chiller 01", "AKTIF", "IB-031"],
          ["Chiller 02", "WARNING", "IB-032"],
        ];
        return `
        <div class="glass-card rounded-xl p-6">
          <div class="flex justify-between items-center mb-8">
            <div>
              <h3 class="font-headline-md text-headline-md">Status Dock</h3>

      function dockCard(dock, status, queue) {
        const cls =
          status === "KOSONG" || status === "SIAP"
            ? "border-2 border-dashed border-outline-variant text-on-surface-variant"

              ? "bg-error-container text-on-error-container border-2 border-error status-pulse"

        return `<div class="rounded-xl p-5 ${cls} min-h-[140px] flex flex-col justify-between hover:-translate-y-1 transition-transform">
        <div class="font-headline-md text-headline-md">${dock}</div>
        <div>
          <div class="font-label-sm text-label-sm uppercase opacity-80">${status}</div>
          <div class="font-queue-id mt-1">${queue}</div>

      function pageMonitor() {
        return `
        ${kpiCards()}
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-gutter">
          <div class="glass-card rounded-xl p-6">

            <div class="h-48 flex items-end gap-2">
              ${[70, 82, 90, 88, 45, 96, 80, 76, 98, 42, 91, 85].map((h, i) => `<div class="flex-1 ${h < 60 ? "bg-error/40 hover:bg-error" : "bg-primary/30 hover:bg-primary"} rounded-t transition-all" style="height:${h}%"></div>`).join("")}
            </div>

          </div>
          <div class="glass-card rounded-xl p-6">
            <h3 class="font-headline-md text-headline-md mb-4">Bottleneck</h3>
            ${bottleneck("IB-018", "Dokumen belum lengkap", "1j 48m", "text-error")}
            ${bottleneck("IB-024", "Menunggu dock kosong", "54m", "text-tertiary")}
            ${bottleneck("IB-031", "Chiller penuh", "48m", "text-tertiary")}

      }

      function bottleneck(id, reason, time, color) {
        return `<div class="bg-surface-container-high/50 p-4 rounded-lg border-l-4 border-current ${color} mb-3">
        <div class="flex justify-between"><span class="font-queue-id text-on-surface">${id}</span><span class="font-queue-id ${color}">${time}</span></div>
        <p class="text-[12px] text-on-surface-variant mt-1">${reason}</p>
      </div>`;
      }

      function pageLaporan() {
        return `
        <div class="glass-card rounded-xl p-6">
          <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
            <div>
              <h3 class="font-headline-md text-headline-md">Laporan Antrian</h3>
              <p class="text-on-surface-variant">Rekap nomor, waktu tunggu, dock, dan status.</p>
            </div>
            <button onclick="exportCsv()" class="bg-primary-container text-on-primary-container px-5 py-3 rounded-lg font-bold flex items-center gap-2 w-fit"><span class="material-symbols-outlined">download</span>Export CSV</button>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            ${selectField("Tanggal", ["Hari Ini", "Kemarin", "7 Hari"])}
            ${selectField("Status", ["Semua", "Menunggu", "Di Dock", "Selesai", "Hold"])}

            ${selectField("Prioritas", ["Semua", "Normal", "High", "VIP"])}

      function pageSetting() {
        return `
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-gutter">
          <div class="glass-card rounded-xl p-6">
            <h3 class="font-headline-md text-headline-md mb-4">Setting SLA</h3>
            ${inputField("SLA Tunggu (menit)", "30")}
            <div class="h-4"></div>
            ${inputField("SLA Bongkar (menit)", "120")}
            <button onclick="showToast('Setting disimpan')" class="mt-6 bg-primary-container text-on-primary-container px-6 py-3 rounded-lg font-bold">Simpan</button>
          </div>
          <div class="glass-card rounded-xl p-6">
            <h3 class="font-headline-md text-headline-md mb-4">Master Dock</h3>
            ${["Dock 01", "Dock 02", "Dock 03", "Dock 04", "Dock 05", "Chiller 01"].map((d) => `<div class="flex justify-between py-3 border-b border-outline-variant/30"><span>${d}</span><span class="text-primary font-bold">Aktif</span></div>`).join("")}
          </div>
        </div>`;
      }

      function pageBantuan() {
        return `
        <div class="glass-card rounded-xl p-6 max-w-4xl">
          <h3 class="font-headline-md text-headline-md mb-4">Cara Pakai Singkat</h3>
          <div class="space-y-4 text-on-surface-variant">
            <p><b class="text-on-surface">1. Daftar:</b> input driver/supplier lalu buat nomor.</p>
            <p><b class="text-on-surface">2. Antrian:</b> pantau urutan driver dan klik panggil berikutnya.</p>
            <p><b class="text-on-surface">3. Panggil:</b> buka di TV/display supaya driver lihat nomor dan dock.</p>
            <p><b class="text-on-surface">4. Dock:</b> cek dock kosong atau sedang proses.</p>
            <p><b class="text-on-surface">5. Laporan:</b> export rekap harian.</p>
          </div>
        </div>`;
      }

      function renderPage(page) {
        const root = document.getElementById("page-root");
        const map = {
          daftar: pageDaftar,
          antrian: pageAntrian,
          panggil: pagePanggil,
          dock: pageDock,
          monitor: pageMonitor,
          laporan: pageLaporan,
          setting: pageSetting,
          bantuan: pageBantuan,
        };
        const safePage = map[page] ? page : "antrian";
        state.page = safePage;
        const meta = pageMeta[safePage];
        document.getElementById("page-title").textContent = meta.title;
        document.getElementById("page-subtitle").textContent = meta.subtitle;
        root.innerHTML = map[safePage]();
        updateActiveNav(safePage);
        history.replaceState(null, "", "#" + safePage);
      }

      function updateActiveNav(page) {
        document.querySelectorAll(".nav-btn").forEach((btn) => {
          const isActive = btn.dataset.page === page;
          btn.className = isActive ? navActive : navBase;
          const icon = btn.querySelector(".material-symbols-outlined");
          const label = btn.querySelector(
            "span:not(.material-symbols-outlined)",
          );
          if (icon)
            icon.style.fontVariationSettings = isActive
              ? "'FILL' 1"
              : "'FILL' 0";
          if (label)
            label.className = isActive
              ? "font-label-sm text-label-sm font-bold"
              : "font-label-sm text-label-sm";
        });
        document.querySelectorAll(".mobile-nav-btn").forEach((btn) => {
          btn.className = btn.dataset.page === page ? mobActive : mobBase;
        });
      }

      function switchPage(page) {
        renderPage(page);
        showToast("Buka menu " + pageMeta[page].title);
      }

      function applyTheme(mode, withToast = true) {
        const html = document.documentElement;
        const icon = document.getElementById("theme-icon");
        const safeMode = mode === "light" ? "light" : "dark";
        html.classList.toggle("light", safeMode === "light");
        html.classList.toggle("dark", safeMode === "dark");
        if (icon)
          icon.innerText = safeMode === "light" ? "light_mode" : "dark_mode";
        localStorage.setItem("inboundQueueTheme", safeMode);
        if (withToast)
          showToast(
            safeMode === "light" ? "Light mode aktif" : "Dark mode aktif",
          );
      }

      function initTheme() {
        applyTheme(localStorage.getItem("inboundQueueTheme") || "dark", false);
      }

      function toggleTheme() {
        const isDark = document.documentElement.classList.contains("dark");
        applyTheme(isDark ? "light" : "dark");
      }

      function callNext(btn) {
        if (btn) btn.classList.add("calling-effect");
        const next =
          state.queue.find(
            (q) => q.status === "MENUNGGU" || q.status === "PRIORITAS",
          ) || state.queue[0];
        if (next) {
          next.status = "DI DOCK";
          next.dock = next.dock === "-" ? "Dock 04" : next.dock;
          state.lastCalled = {
            queue: next.id,
            dock: next.dock,
            driver: next.driver,
          };
        }
        showToast(
          `Memanggil ${state.lastCalled.queue} ke ${state.lastCalled.dock}`,
        );
        setTimeout(() => {
          if (btn) btn.classList.remove("calling-effect");
          if (state.page === "panggil") renderPage("panggil");
          if (state.page === "antrian") renderPage("antrian");
        }, 450);
      }

      function recall() {
        showToast(`Panggil ulang ${state.lastCalled.queue}`);
      }

      function generateQueue() {
        const num = Math.floor(28 + Math.random() * 70);
        const id = "IB-" + String(num).padStart(3, "0");
        document.getElementById("new-queue-number").textContent = id;
        state.queue.unshift({
          id,
          status: "MENUNGGU",
          dock: "-",
          wait: "00:00",
          driver: "Driver Baru",
          supplier: "Supplier Baru",
          priority: "Normal",
        });
        showToast(`Nomor ${id} dibuat`);
      }

      function exportCsv() {
        const header = "queue_id,status,dock,wait_time,driver,supplier\n";
        const rows = state.queue
          .map(
            (q) =>
              `${q.id},${q.status},${q.dock},${q.wait},${q.driver},${q.supplier}`,
          )
          .join("\n");
        const blob = new Blob([header + rows], { type: "text/csv" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "laporan_antrian_inbound.csv";
        a.click();
        URL.revokeObjectURL(url);
        showToast("CSV didownload");
      }

      function showToast(msg) {
        const toast = document.getElementById("toast");
        const message = document.getElementById("toast-message");
        message.innerText = msg;
        toast.classList.remove("opacity-0", "translate-y-10");
        toast.classList.add("opacity-100", "translate-y-0");
        setTimeout(() => {
          toast.classList.add("opacity-0", "translate-y-10");
          toast.classList.remove("opacity-100", "translate-y-0");
        }, 2300);
      }

      function tickClock() {
        const clock = document.getElementById("live-clock");
        if (clock) clock.textContent = new Date().toLocaleTimeString("id-ID");
      }

      function initShader() {
        const canvas = document.getElementById("shader-canvas");
        const gl =
          canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
        if (!gl) return;
        function syncSize() {
          const w = canvas.clientWidth || 1280,
            h = canvas.clientHeight || 720;
          if (canvas.width !== w || canvas.height !== h) {
            canvas.width = w;
            canvas.height = h;
          }
        }
        if (typeof ResizeObserver !== "undefined")
          new ResizeObserver(syncSize).observe(canvas);
        syncSize();

        const vs = `attribute vec2 a_position; varying vec2 v_texCoord; void main(){ v_texCoord=a_position*0.5+0.5; gl_Position=vec4(a_position,0.0,1.0); }`;
        const fs = `precision highp float; uniform float u_time; uniform vec2 u_resolution; varying vec2 v_texCoord;
        float sdRoundRect(vec2 p, vec2 b, float r){ vec2 d=abs(p)-b+r; return min(max(d.x,d.y),0.0)+length(max(d,0.0))-r; }
        void main(){
          vec2 uv=v_texCoord; vec2 p=(uv*2.0-1.0); p.x*=u_resolution.x/u_resolution.y;
          float d=length(p);
          vec3 bg=mix(vec3(0.03,0.08,0.15),vec3(0.01,0.02,0.05),d);
          float logo=0.0;
          for(float i=0.0;i<3.0;i++){
            float t=u_time*(0.5+i*0.2);
            vec2 off=vec2(sin(t+i),cos(t*0.8+i))*0.4;
            vec2 lp=p-off;
            float a=t*0.5;
            lp=mat2(cos(a),-sin(a),sin(a),cos(a))*lp;
            float box=sdRoundRect(lp,vec2(0.15,0.15),0.02);
            logo+=0.01/abs(box+0.01*sin(u_time*2.0+i));
          }
          vec3 finalColor=bg+vec3(0.15,0.4,0.9)*logo;
          float stream=0.0;
          for(float i=0.0;i<5.0;i++){
            float row=fract(uv.y+u_time*(0.1+i*0.05)+i*0.2);
            float line=smoothstep(0.01,0.0,abs(row-0.5));
            stream+=line*0.1*(0.5+0.5*sin(uv.x*10.0+u_time));
          }
          finalColor+=vec3(0.4,0.6,1.0)*stream;
          gl_FragColor=vec4(finalColor,1.0);
        }`;
        function shader(type, src) {
          const s = gl.createShader(type);
          gl.shaderSource(s, src);
          gl.compileShader(s);
          return s;
        }
        const prog = gl.createProgram();
        gl.attachShader(prog, shader(gl.VERTEX_SHADER, vs));
        gl.attachShader(prog, shader(gl.FRAGMENT_SHADER, fs));
        gl.linkProgram(prog);
        gl.useProgram(prog);
        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(
          gl.ARRAY_BUFFER,
          new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]),
          gl.STATIC_DRAW,
        );
        const pos = gl.getAttribLocation(prog, "a_position");
        gl.enableVertexAttribArray(pos);
        gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
        const uTime = gl.getUniformLocation(prog, "u_time");
        const uRes = gl.getUniformLocation(prog, "u_resolution");
        function render(t) {
          if (typeof ResizeObserver === "undefined") syncSize();
          gl.viewport(0, 0, canvas.width, canvas.height);
          gl.uniform1f(uTime, t * 0.001);
          gl.uniform2f(uRes, canvas.width, canvas.height);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
          requestAnimationFrame(render);
        }
        render(0);
      }

      document.addEventListener("click", (e) => {
        const btn = e.target.closest("[data-page]");
        if (btn) switchPage(btn.dataset.page);
      });

      window.addEventListener("hashchange", () =>
        renderPage((location.hash || "#antrian").replace("#", "")),
      );

      initTheme();
      setInterval(tickClock, 1000);
      tickClock();
      initShader();
      renderPage((location.hash || "#antrian").replace("#", ""));
    </script>
  </body>
